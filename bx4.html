<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>政治必修四</title>
<link rel="stylesheet" href="css/markmap-toolbar@0.18.12-dist-style.css">
<style>
:root{
  --bg:        #080b10;
  --surface:   #111620;
  --surface2:  #161c28;
  --surface3:  #1c2333;
  --border:    rgba(255,255,255,.055);
  --border2:   rgba(255,255,255,.1);
  --text:      #ffffff;
  --text2:     rgb(255, 255, 255);
  --text3:     rgb(255, 255, 255);
  --accent:    #7eaaff;
  --accent2:   #a78bff;
  --accent-glow: rgba(126,170,255,.18);
  --accent-soft: rgba(126,170,255,.12);
  --danger:    #f87171;
  --danger-soft: rgba(248,113,113,.12);
  --line:      rgba(255,255,255,.38);
  --ease-out:  cubic-bezier(.22,.68,0,1.2);
  --ease-soft: cubic-bezier(.25,.8,.25,1);
  --ease-snap: cubic-bezier(.4,0,.2,1);
}

*{ margin:0; padding:0; box-sizing:border-box; }

html,body{
  height:100%; background:var(--bg);
  font-family:"Georgia","Noto Serif SC","Source Han Serif SC",serif;
  color:var(--text); overflow:auto;
  -webkit-font-smoothing:antialiased;
  scrollbar-width:none;        /* Firefox */
  -ms-overflow-style:none;     /* IE/Edge */
}
html::-webkit-scrollbar,
body::-webkit-scrollbar{ display:none; } /* Chrome/Safari */

/* ── 思维导图 ─────────────────────────────── */
#mindmap{ width:100vw; height:100vh; overflow:visible; }
.markmap-node text{ fill:var(--text); font-size:15px; }
.markmap-node div{
  max-width:300px; line-height:1.65;
  word-break:break-word; overflow:visible; color:var(--text);
}
.markmap-link{ stroke:var(--line); stroke-width:1.1; }
.markmap-node:hover text{ fill:var(--accent); }
.markmap-node foreignObject{ overflow:visible; }
.markmap-node.highlighted text{ fill:var(--accent)!important; font-weight:700; }
.markmap-node.highlighted circle{ fill:var(--accent); stroke:var(--accent); }
.markmap-node.highlighted{ filter:drop-shadow(0 0 12px rgba(126,170,255,.55)); }
.markmap-link.highlighted-path{ stroke:var(--accent); stroke-width:2.5; stroke-opacity:1; }
svg{ opacity:0; animation:svgIn .6s var(--ease-snap) .1s forwards; }
@keyframes svgIn{ from{opacity:0} to{opacity:1} }

/* ── 底部控制栏 ───────────────────────────── */
.global-controls{
  position:fixed; bottom:24px; left:24px;
  display:flex; gap:10px; z-index:800;
}
.control-group{ position:relative; }

.control-btn{
  display:flex; align-items:center; gap:7px;
  background:var(--surface);
  border:1px solid var(--border2);
  padding:9px 16px; border-radius:14px;
  color:var(--text2); cursor:pointer; font-size:13px;
  font-family:inherit;
  backdrop-filter:blur(20px);
  box-shadow:0 4px 24px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.05);
  transition:color .2s, border-color .2s, background .2s, transform .15s, box-shadow .2s;
  letter-spacing:.01em;
}
.control-btn:hover{
  color:var(--accent); border-color:rgba(126,170,255,.4);
  background:var(--surface2); transform:translateY(-1px);
  box-shadow:0 6px 32px rgba(0,0,0,.5), 0 0 0 1px rgba(126,170,255,.1);
}
.btn-icon{ font-size:14px; opacity:.65; transition:opacity .2s; }
.control-btn:hover .btn-icon{ opacity:1; }

.control-panel{
  position:absolute; bottom:calc(100% + 10px); left:0;
  width:248px; background:var(--surface);
  border-radius:18px; padding:10px;
  display:flex; flex-direction:column; gap:2px;
  border:1px solid var(--border2);
  backdrop-filter:blur(24px);
  box-shadow:0 24px 72px rgba(0,0,0,.65), 0 0 0 1px rgba(255,255,255,.03);
  opacity:0; transform:translateY(12px) scale(.95);
  pointer-events:none;
  transition:opacity .26s var(--ease-soft), transform .26s var(--ease-soft);
  transform-origin:bottom left;
}
.control-group.open .control-panel{
  opacity:1; transform:translateY(0) scale(1); pointer-events:auto;
}
.control-panel button{
  background:transparent; border:none;
  padding:8px 12px; text-align:left; border-radius:9px;
  color:var(--text2); cursor:pointer; font-size:13px;
  font-family:inherit; letter-spacing:.01em;
  transition:background .15s, color .15s, padding-left .2s;
}
.control-panel button:hover{
  background:var(--accent-soft); color:var(--accent); padding-left:17px;
}
.cp-divider{ height:1px; background:var(--border); margin:5px 2px; }

.cp-row{ display:flex; gap:6px; padding:3px 2px; }
.cp-row input{
  flex:1; background:var(--surface3); border:1px solid var(--border);
  border-radius:8px; padding:6px 9px; color:var(--text); font-size:12.5px;
  outline:none; font-family:inherit;
  transition:border-color .18s, background .18s;
}
.cp-row input:focus{ border-color:rgba(126,170,255,.45); background:rgba(126,170,255,.07); }
#keywordInput, #customLevel{ color:#b8ceff; }
#keywordInput::placeholder, #customLevel::placeholder{ color:rgba(255, 255, 255, 0.60); }
.cp-apply{
  padding:6px 10px!important; font-size:12px!important;
  background:var(--surface3)!important; color:var(--text2)!important;
  border:1px solid var(--border)!important; border-radius:8px!important;
  cursor:pointer!important; font-family:inherit!important;
  transition:.18s!important; letter-spacing:0!important;
}
.cp-apply:hover{
  background:var(--accent-soft)!important; color:var(--accent)!important;
  border-color:rgba(126,170,255,.4)!important;
}

.cp-checks{ display:flex; flex-direction:column; gap:1px; padding:2px; }
.cp-check{
  display:flex; align-items:center; gap:8px; cursor:pointer;
  font-size:12.5px; color:var(--text2); padding:6px 10px;
  border-radius:8px; user-select:none;
  transition:background .15s, color .15s;
}
.cp-check:hover{ background:var(--surface3); color:var(--text); }
.cp-check input{ display:none; }
.cp-box{
  width:14px; height:14px; border-radius:4px; flex-shrink:0;
  border:1.5px solid rgba(255,255,255,.2); background:transparent;
  position:relative; transition:.18s;
}
.cp-check:hover .cp-box{ border-color:var(--accent); }
.cp-check input:checked+.cp-box{
  background:var(--accent); border-color:var(--accent);
  box-shadow:0 0 10px rgba(126,170,255,.4);
}
.cp-check input:checked+.cp-box::after{
  content:""; position:absolute;
  left:3px; top:0; width:4px; height:8px;
  border:solid white; border-width:0 2px 2px 0;
  transform:rotate(45deg);
}

/* ── 右键菜单 ─────────────────────────────── */
.context-menu{
  position:fixed; z-index:9999;
  background:var(--surface); border:1px solid var(--border2);
  border-radius:14px; padding:6px;
  box-shadow:0 16px 48px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.04);
  backdrop-filter:blur(20px);
  display:flex; flex-direction:column; gap:2px;
  opacity:0; transform:scale(.93) translateY(6px);
  visibility:hidden; pointer-events:none;
  transition:
    opacity .22s var(--ease-soft),
    transform .22s var(--ease-soft),
    visibility 0s linear .22s;
  transform-origin:top left;
}
.context-menu.show{
  opacity:1; transform:scale(1) translateY(0);
  visibility:visible; pointer-events:auto;
  transition:
    opacity .22s var(--ease-soft),
    transform .22s var(--ease-soft),
    visibility 0s linear 0s;
}
.ctx-label{
  padding:4px 14px 5px; font-size:10.5px;
  letter-spacing:.1em; color:var(--text3); text-transform:uppercase;
}
.ctx-btn{
  background:transparent; border:none;
  padding:9px 14px; text-align:left; border-radius:8px;
  color:var(--text2); font-size:13px; font-family:inherit;
  cursor:pointer; white-space:nowrap; letter-spacing:.01em;
  transition:background .15s, color .15s, padding-left .18s;
}
.ctx-btn:hover{ background:var(--accent-soft); color:var(--accent); padding-left:18px; }

/* ── Toast ───────────────────────────────── */
.toast-container{
  position:fixed; top:20px; right:20px;
  display:flex; flex-direction:column; gap:8px;
  z-index:10001; pointer-events:none;
}
.toast{
  display:flex; align-items:center; gap:10px;
  background:var(--surface2); border:1px solid var(--border);
  padding:11px 16px; border-radius:13px;
  color:var(--text2); font-size:13px;
  box-shadow:0 8px 32px rgba(0,0,0,.5); backdrop-filter:blur(16px);
  opacity:0; transform:translateX(16px) translateY(-4px);
  transition:all .3s var(--ease-out);
  pointer-events:auto; max-width:300px;
}
.toast.show{ opacity:1; transform:translateX(0) translateY(0); }
.toast-dot{ width:6px; height:6px; border-radius:50%; flex-shrink:0; background:var(--text3); }
.toast.danger{ border-color:rgba(248,113,113,.3); }
.toast.danger .toast-dot{ background:var(--danger); box-shadow:0 0 8px rgba(248,113,113,.5); }
.toast.success{ border-color:rgba(126,170,255,.25); }
.toast.success .toast-dot{ background:var(--accent); box-shadow:0 0 8px rgba(126,170,255,.5); }

/* ── 弹窗遮罩 ─────────────────────────────── */
#fav-modal{
  position:fixed; inset:0;
  background:rgba(4,6,12,.82);
  backdrop-filter:blur(18px) saturate(1.2);
  display:none; align-items:center; justify-content:center;
  z-index:10000; opacity:0;
  transition:opacity .28s var(--ease-snap);
}
#fav-modal.show{ display:flex; opacity:1; }

/* ── 弹窗主体 ─────────────────────────────── */
.fav-modal-box{
  background:var(--surface);
  border-radius:24px;
  width:min(92vw, 860px); height:min(88vh, 640px);
  display:flex; flex-direction:column;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.07),
    0 40px 100px rgba(0,0,0,.82),
    0 0 140px rgba(126,170,255,.04);
  overflow:hidden;
  transform:scale(.9) translateY(36px); opacity:0;
  transition:transform .36s var(--ease-out), opacity .36s var(--ease-out);
}
#fav-modal.show .fav-modal-box{ transform:scale(1) translateY(0); opacity:1; }

/* 弹窗头部 */
.fav-head{
  display:flex; align-items:center; gap:12px;
  padding:20px 22px 16px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  background:linear-gradient(180deg,rgba(22,28,40,.6) 0%,transparent 100%);
}
.fav-head-icon{
  width:32px; height:32px; border-radius:9px;
  background:var(--accent-soft); border:1px solid rgba(126,170,255,.2);
  display:flex; align-items:center; justify-content:center;
  font-size:15px; flex-shrink:0; color:var(--accent);
}
.fav-head h2{
  flex:1; font-size:16px; font-weight:normal;
  letter-spacing:.02em; color:var(--text);
}
.fav-close{
  width:30px; height:30px;
  background:none; border:none; color:var(--text3);
  font-size:18px; cursor:pointer; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  transition:background .18s, color .18s, transform .22s;
}
.fav-close:hover{ background:var(--surface3); color:var(--text); transform:rotate(90deg); }

/* 弹窗内容 */
.fav-body{ display:flex; flex:1; overflow:hidden; }

/* ── 左侧分组 ────────────────────────────── */
.fav-sidebar{
  width:190px; flex-shrink:0;
  display:flex; flex-direction:column;
  border-right:1px solid var(--border);
  padding:12px 10px 14px; gap:2px;
  overflow-y:auto;
  background:rgba(0,0,0,.15);
}
.fav-sidebar::-webkit-scrollbar{ width:3px; }
.fav-sidebar::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.08); border-radius:2px; }

.sidebar-label{
  font-size:10px; letter-spacing:.12em; text-transform:uppercase;
  color:var(--text3); padding:2px 8px 9px;
}

.group-item{
  display:flex; align-items:center; gap:7px;
  padding:7px 9px; border-radius:9px;
  cursor:pointer; position:relative;
  color:var(--text2); font-size:13px; min-height:34px;
  transition:background .18s, color .18s;
}
.group-item:hover{ background:var(--surface3); color:var(--text); }
.group-item.active{ background:var(--accent-soft); color:var(--accent); }
.group-item.active::before{
  content:""; position:absolute; left:0; top:50%;
  transform:translateY(-50%);
  width:2px; height:56%; background:var(--accent);
  border-radius:0 2px 2px 0; box-shadow:0 0 8px rgba(126,170,255,.6);
}
.g-label{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.g-inline-input{
  flex:1; background:rgba(126,170,255,.1);
  border:1px solid rgba(126,170,255,.45);
  border-radius:6px; padding:2px 7px;
  color:var(--text); font-size:12.5px;
  outline:none; font-family:inherit;
}
.g-count{
  font-size:11px; padding:1px 6px; border-radius:999px;
  background:rgba(255,255,255,.06); color:var(--text3); flex-shrink:0;
  transition:.18s;
}
.group-item.active .g-count{ background:rgba(126,170,255,.2); color:var(--accent); }
.g-acts{ display:none; gap:1px; flex-shrink:0; }
.group-item:hover .g-acts,
.group-item.active .g-acts{ display:flex; }
.g-act{
  width:22px; height:22px; background:none; border:none;
  color:var(--text3); cursor:pointer; border-radius:5px; font-size:11px;
  display:flex; align-items:center; justify-content:center;
  transition:background .15s, color .15s;
}
.g-act:hover{ background:rgba(126,170,255,.15); color:var(--accent); }
.g-act.del:hover{ background:var(--danger-soft); color:var(--danger); }

.g-add-btn{
  display:flex; align-items:center; gap:7px;
  padding:7px 9px; border-radius:9px;
  background:none; border:1px dashed rgba(126,170,255,.2);
  color:rgba(126,170,255,.45); font-size:12.5px;
  cursor:pointer; width:100%; text-align:left;
  font-family:inherit; margin-top:6px;
  transition:background .18s, color .18s, border-color .18s;
}
.g-add-btn:hover{
  background:var(--accent-soft); color:var(--accent);
  border-color:rgba(126,170,255,.45);
}

.g-add-row{
  display:none; align-items:center; gap:5px;
  padding:4px 2px; margin-top:4px;
}
.g-add-row.open{ display:flex; }
.g-add-row input{
  flex:1; background:rgba(126,170,255,.07);
  border:1px solid rgba(126,170,255,.45);
  border-radius:8px; padding:5px 8px;
  color:var(--text); font-size:12.5px;
  outline:none; font-family:inherit;
}
.g-add-ok{
  width:26px; height:26px; flex-shrink:0;
  background:var(--accent); border:none; border-radius:6px;
  color:#05090f; font-size:13px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:background .15s, transform .12s;
}
.g-add-ok:hover{ background:#9dc0ff; transform:scale(1.06); }
.g-add-cancel{
  width:26px; height:26px; flex-shrink:0;
  background:none; border:none; color:var(--text3);
  font-size:16px; cursor:pointer; border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  transition:background .15s, color .15s;
}
.g-add-cancel:hover{ background:var(--danger-soft); color:var(--danger); }

/* 删除确认浮层 */
.del-overlay{
  position:absolute; inset:0; border-radius:9px;
  background:rgba(8,11,16,.93); backdrop-filter:blur(5px);
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:8px; z-index:10; padding:8px;
  opacity:0; pointer-events:none; transition:opacity .18s;
}
.del-overlay.open{ opacity:1; pointer-events:auto; }
.del-overlay p{
  font-size:11.5px; color:var(--text2);
  text-align:center; line-height:1.55;
}
.del-overlay-btns{ display:flex; gap:5px; }
.del-overlay-btns button{
  padding:4px 11px; border-radius:6px; font-size:11.5px;
  cursor:pointer; border:none; font-family:inherit; transition:.15s;
}
.d-ok{ background:rgba(248,113,113,.2); color:#fca5a5; }
.d-ok:hover{ background:rgba(248,113,113,.38); }
.d-no{ background:var(--surface3); color:var(--text2); }
.d-no:hover{ background:var(--border2); }

/* ── 右侧主内容 ──────────────────────────── */
.fav-main{
  flex:1; display:flex; flex-direction:column;
  overflow:hidden; padding:14px 18px 18px;
}

/* 工具栏 */
.fav-bar{
  display:flex; gap:7px; align-items:center;
  flex-shrink:0; margin-bottom:12px; flex-wrap:wrap;
}
.fav-search{
  flex:1; min-width:110px; background:var(--surface3);
  border:1px solid var(--border); border-radius:9px;
  padding:7px 11px; color:var(--text); font-size:13px;
  outline:none; font-family:inherit;
  transition:border-color .18s, background .18s;
}
.fav-search::placeholder{ color:var(--text3); }
.fav-search:focus{ border-color:rgba(126,170,255,.4); background:rgba(126,170,255,.06); }

.tb-btn{
  padding:6px 11px; border-radius:8px;
  border:1px solid var(--border); background:transparent;
  color:var(--text2); cursor:pointer; font-size:12px;
  font-family:inherit; white-space:nowrap;
  transition:background .18s, color .18s, border-color .18s, transform .12s;
}
.tb-btn:hover{
  background:var(--accent-soft); color:var(--accent);
  border-color:rgba(126,170,255,.35); transform:translateY(-1px);
}
.tb-btn.active{
  background:var(--accent-soft); color:var(--accent);
  border-color:rgba(126,170,255,.35);
}
.layout-grp{ display:flex; gap:3px; }
.layout-grp button{
  padding:6px 10px; border-radius:8px;
  border:1px solid var(--border); background:transparent;
  color:var(--text3); cursor:pointer; font-size:12px;
  font-family:inherit; transition:background .18s, color .18s, border-color .18s;
}
.layout-grp button.active{
  background:var(--accent-soft); color:var(--accent);
  border-color:rgba(126,170,255,.35);
}

/* 滚动容器 */
.fav-scroll{
  flex:1; overflow-y:auto; overflow-x:hidden;
}
.fav-scroll::-webkit-scrollbar{ width:3px; }
.fav-scroll::-webkit-scrollbar-track{ background:transparent; }
.fav-scroll::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.1); border-radius:2px; }

/* 列表 */
.fav-list{ display:grid; gap:8px; }
.fav-list.one-col{ grid-template-columns:1fr; }
.fav-list.two-col{ grid-template-columns:repeat(2,minmax(0,1fr)); }

@keyframes slideR{ from{opacity:0;transform:translateX(14px)} to{opacity:1;transform:translateX(0)} }
@keyframes slideL{ from{opacity:0;transform:translateX(-14px)} to{opacity:1;transform:translateX(0)} }
.fav-list.anim-r{ animation:slideR .22s var(--ease-soft) both; }
.fav-list.anim-l{ animation:slideL .22s var(--ease-soft) both; }

/* 条目 */
.fav-item{
  display:flex; align-items:center; gap:9px;
  padding:10px 12px; border-radius:12px;
  background:var(--surface2); border:1px solid transparent;
  cursor:grab; user-select:none;
  transition:background .18s, border-color .18s, transform .2s, box-shadow .2s;
}
.fav-item:hover{
  background:rgba(126,170,255,.07);
  border-color:rgba(126,170,255,.14);
  transform:translateY(-1px);
  box-shadow:0 4px 20px rgba(0,0,0,.3);
}
.fav-item.dragging{ opacity:.4; transform:scale(.96); cursor:grabbing; box-shadow:none!important; }
.fav-item.drag-over{
  border-color:var(--accent)!important;
  background:rgba(126,170,255,.1)!important;
}
.drag-handle{
  cursor:grab; opacity:.22; font-size:14px;
  flex-shrink:0; letter-spacing:-1px; line-height:1;
  touch-action:none;
  transition:opacity .18s, color .18s;
}
.fav-item:hover .drag-handle{ opacity:.65; color:var(--accent); }

.fav-item input[type="checkbox"]{
  width:15px; height:15px; accent-color:var(--accent);
  cursor:pointer; flex-shrink:0;
}
.fav-content{
  flex:1; font-size:13px; line-height:1.45;
  word-break:break-all; color:var(--text);
}
.fav-item-right{
  display:flex; align-items:center; gap:6px; flex-shrink:0;
}
.fav-grp-sel{
  background:var(--surface3); border:1px solid var(--border);
  border-radius:6px; padding:3px 6px;
  color:var(--text2); font-size:11.5px;
  outline:none; cursor:pointer; font-family:inherit;
  max-width:78px;
  transition:border-color .18s, color .18s, background .18s;
}
.fav-grp-sel:hover,.fav-grp-sel:focus{
  border-color:rgba(126,170,255,.4); color:var(--accent);
  background:rgba(126,170,255,.08);
}
.fav-grp-sel option{ background:#1c2333; color:var(--text); }

.type-pill{
  font-size:11px; padding:2px 8px; border-radius:999px;
  background:rgba(167,139,255,.1); color:rgba(167,139,255,.75);
  white-space:nowrap; flex-shrink:0; letter-spacing:.02em;
}

/* 空态 */
.fav-empty{
  text-align:center; color:var(--text3);
  padding:52px 0 20px; font-size:13px; line-height:2;
}
.fav-empty-icon{ font-size:26px; display:block; margin-bottom:8px; opacity:.35; }

/* 底部按钮 */
.fav-actions{
  display:flex; gap:10px; margin-top:14px; flex-shrink:0;
}
.fav-actions button{
  flex:1; padding:11px; border:none; border-radius:13px;
  font-size:13.5px; cursor:pointer; font-family:inherit;
  letter-spacing:.02em;
  transition:background .2s, transform .15s, box-shadow .2s;
}
.fav-show-btn{
  background:var(--accent); color:#05090f;
  box-shadow:0 4px 20px rgba(126,170,255,.25);
}
.fav-show-btn:hover{
  background:#a0c0ff; transform:translateY(-1px);
  box-shadow:0 6px 28px rgba(126,170,255,.38);
}
.fav-del-btn{
  background:var(--danger-soft); color:#fca5a5;
  border:1px solid rgba(248,113,113,.18)!important;
}
.fav-del-btn:hover{ background:rgba(248,113,113,.25); transform:translateY(-1px); }


/* ── 左上角动作栏 ─────────────────────────── */
.top-left-actions {
  position: fixed;
  top: 24px;
  left: 24px;
  z-index: 800;
  display: flex;
  gap: 10px;
}

.back-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border2);
  padding: 10px 18px;
  border-radius: 14px;
  color: var(--text2);
  text-decoration: none; /* 去除链接下划线 */
  font-size: 13px;
  font-family: inherit;
  backdrop-filter: blur(20px);
  box-shadow: 0 4px 24px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.05);
  transition: all .2s var(--ease-soft);
  letter-spacing: .02em;
}

.back-btn:hover {
  color: var(--accent);
  border-color: rgba(126,170,255,.4);
  background: var(--surface2);
  transform: translateY(-1px);
  box-shadow: 0 6px 32px rgba(0,0,0,.5), 0 0 0 1px rgba(126,170,255,.1);
}

.back-btn .btn-icon {
  font-size: 16px;
  opacity: .7;
  transition: transform .3s var(--ease-out);
}

.back-btn:hover .btn-icon {
  opacity: 1;
  transform: translateX(-3px); /* 悬停时箭头微动 */
}

/* 适配移动端 */
@media (max-width: 600px) {
  .top-left-actions { top: 16px; left: 16px; }
  .back-btn { padding: 8px 14px; font-size: 12px; }
}
</style>
</head>

  const PAGE_SCOPE=((location.pathname.split('/').pop()||'index.html').replace(/[^a-zA-Z0-9_-]/g,'_').toLowerCase());
  const SKEY=`mindmapFavoritesV3:${PAGE_SCOPE}`;

  /* ══ Toast ══ */
  const toastBox=document.getElementById('toast-container');
  function showToast(msg,type='default',dur=2800){
    const el=document.createElement('div');
    el.className=`toast ${type}`;
    el.innerHTML=`<span class="toast-dot"></span>${msg}`;
    toastBox.appendChild(el);
    requestAnimationFrame(()=>el.classList.add('show'));
    let t=setTimeout(dismiss,dur);
    function dismiss(){
      el.classList.remove('show');
      el.addEventListener('transitionend',()=>el.remove(),{once:true});
    }
    el.addEventListener('mouseenter',()=>clearTimeout(t));
    el.addEventListener('mouseleave',()=>{t=setTimeout(dismiss,dur);});
  }

  /* ══ 存储 ══ */
  function readStoredState(key){
    try{
      const raw=localStorage.getItem(key);
      if(!raw)return null;
      const parsed=JSON.parse(raw);
      if(!parsed||typeof parsed!=='object')return null;
      return parsed;
    }catch(e){
      return null;
    }
  }
  function applyStoredState(state){
    favorites=Array.isArray(state?.favorites)?state.favorites:[];
    groups=(Array.isArray(state?.groups)&&state.groups.length)?state.groups:[{id:0,name:'默认分组'}];
  }
  function load(){
    const scopedState=readStoredState(SKEY);
    if(scopedState){
      applyStoredState(scopedState);
      return;
    }

    const legacyState=readStoredState(LEGACY_SKEY);
    if(legacyState){
      applyStoredState(legacyState);
      favorites=favorites.filter(f=>f.path?nodeExistsInOrig(f.path):nodeExistsInOrig([f.content]));
      save();
      return;
    }

    favorites=[];
    groups=[{id:0,name:'默认分组'}];
  }
  function save(){localStorage.setItem(SKEY,JSON.stringify({favorites,groups}));}

  /* ══ 树工具 ══ */
  function getPathContents(root,target){
    function f(n,p=[]){
      const np=[...p,n.content];
      if(n.content===target)return np;
      for(const c of n.children||[]){const r=f(c,np);if(r)return r;}
      return null;
    }
    return f(root)||[target];
  }
  function getNodePath(root,target){
    function f(n,p=[]){
      const np=[...p,n.content];
      if(n.content===target)return np;
      for(const c of n.children||[]){const r=f(c,np);if(r)return r;}
      return null;
    }
    return f(root);
  }
  function collectDesc(node,s){s.add(node.content);(node.children||[]).forEach(c=>collectDesc(c,s));}
  function pruneToKept(node,kept){
    if(!kept.has(node.content))return null;
    if(node.children)node.children=node.children.map(c=>pruneToKept(c,kept)).filter(Boolean);
    return node;
  }
  function nodeExistsInOrig(path){
    let n=originalData;
    for(const p of path){
      if(!n)return false;
      if(n.content===p)continue;
      n=(n.children||[]).find(c=>c.content===p);
    }
    return!!n;
  }
  function cleanFavs(){
    const old=favorites.length;
    favorites=favorites.filter(f=>f.path?nodeExistsInOrig(f.path):nodeExistsInOrig([f.content]));
    if(favorites.length!==old){save();showToast('已清理失效收藏','success');}
  }
  function addOrUpdateFav(content,type){
    if(!content)return;
    const path=getNodePath(originalData,content);
    if(!path)return;
    const ex=favorites.find(f=>JSON.stringify(f.path)===JSON.stringify(path));
    if(ex){ex.type=type;ex.updated=Date.now();showToast('已更新收藏','success');}
    else{favorites.push({id:crypto.randomUUID(),content,path,type,added:Date.now(),groupId:0});showToast('收藏成功','success');}
    save();
    /* 弹窗开着时刷新 UI */
    setTimeout(()=>{
      const m=document.getElementById('fav-modal');
      if(m && m.classList.contains('show') && typeof renderGroups==='function'){
        renderGroups(); renderList();
      }
    }, 0);
  }
  function keptByPath(root,path,type){
    const s=new Set(path);
    if(type==='all'){
      let n=root;
      for(let i=1;i<path.length;i++){n=(n.children||[]).find(c=>c.content===path[i]);if(!n)break;}
      if(n)collectDesc(n,s);
    }
    return s;
  }

  /* ══ 展开控制 ══ */
  function setLevel(node,level,depth=0){
    node.payload=node.payload||{};
    node.payload.fold=depth<level?0:1;
    node.children?.forEach(c=>setLevel(c,level,depth+1));
  }
  function applyLevel(level){setLevel(mm.state.data,level);safeSet(mm.state.data);}
  function isImportant(n){const h=n.content||"";return h.includes("<strong>")||h.includes("<em>");}
  function pruneImportant(n){
    const imp=isImportant(n);let hasD=false;
    if(n.children){n.children=n.children.map(c=>{const p=pruneImportant(c);if(p)hasD=true;return p;}).filter(Boolean);}
    if(imp||hasD){n.payload={fold:0};if(!hasD&&imp)n.children=[];return n;}
    return null;
  }
  function matchNode(n,words,matchAll){
    const text=(n.content||"").toLowerCase();
    const inc=words.filter(w=>!w.startsWith("-"));
    const exc=words.filter(w=>w.startsWith("-")).map(w=>w.slice(1));
    if(exc.some(w=>text.includes(w)))return false;
    if(!inc.length)return true;
    return matchAll?inc.every(w=>text.includes(w)):inc.some(w=>text.includes(w));
  }
  function findOrig(tree,content){
    if(tree.content===content)return tree;
    for(const c of tree.children||[]){const f=findOrig(c,content);if(f)return f;}
    return null;
  }
  function pruneKeyword(n,words,matchAll,cut,src){
    const m=matchNode(n,words,matchAll);let hasD=false;
    if(n.children){n.children=n.children.map(c=>{const p=pruneKeyword(c,words,matchAll,cut,src);if(p)hasD=true;return p;}).filter(Boolean);}
    if(m){
      n.payload={fold:0};
      if(!cut){const o=findOrig(src,n.content);if(o)n.children=JSON.parse(JSON.stringify(o.children||[]));}
      return n;
    }
    if(hasD){n.payload={fold:0};return n;}
    return null;
  }
  function safeSet(d){
    mm.setData(d);
    setTimeout(()=>{attachEvents();cleanFavs();},450);
  }
  function setAutoFitEnabled(enabled){
    const next=!!enabled;
    if(typeof mm.setOptions==='function')mm.setOptions({...mm.options,autoFit:next});
    else mm.options={...(mm.options||{}),autoFit:next};
  }

  /* ══ 节点事件 ══ */
  function attachEvents(){
    d3.selectAll('.markmap-node')
      .on('mouseover',(_,d)=>{
        if(!d?.content)return;
        const p=getPathContents(mm.state.data,d.content);
        d3.selectAll('.markmap-node').classed('highlighted',x=>p.includes(x.content));
        d3.selectAll('.markmap-link').classed('highlighted-path',x=>{
          if(!x?.source||!x?.target)return false;
          return p.includes(x.source.content)&&p.includes(x.target.content);
        });
      })
      .on('mouseout',()=>{
        d3.selectAll('.markmap-node').classed('highlighted',false);
        d3.selectAll('.markmap-link').classed('highlighted-path',false);
      })
      .on('contextmenu',(e,d)=>{
        e.preventDefault();
        if(d?.content)showCtx(e,d.content);
      });
  }

  /* ══ 控制栏 ══ */
  const expCtrl=document.getElementById('expand-control');
  const favCtrl=document.getElementById('favorites-control');
  function closeAll(){expCtrl.classList.remove('open');favCtrl.classList.remove('open');}
  function toggle(id){const g=document.getElementById(id);const was=g.classList.contains('open');closeAll();if(!was)g.classList.add('open');}

  document.querySelector('#expand-control .control-btn').onclick=()=>toggle('expand-control');
  const autoFitToggle=document.getElementById('autoFitToggle');
  autoFitToggle.checked=false;
  setAutoFitEnabled(false);
  autoFitToggle.onchange=()=>setAutoFitEnabled(autoFitToggle.checked);
  document.querySelector('#favorites-control .control-btn').onclick=()=>toggle('favorites-control');
  document.addEventListener('mousedown',e=>{
    if(!expCtrl.contains(e.target)&&!favCtrl.contains(e.target))closeAll();
    if(ctxMenu.classList.contains('show')&&!ctxMenu.contains(e.target))hideCtx();
  },true);

  document.querySelectorAll('#expand-control [data-level]').forEach(btn=>{
    btn.onclick=()=>applyLevel(btn.dataset.level==='Infinity'?Infinity:+btn.dataset.level);
  });
  document.getElementById('applyCustom').onclick=()=>{
    const v=+document.getElementById('customLevel').value;
    if(!isNaN(v))applyLevel(v);
  };
  document.getElementById('focusTerminal').onclick=()=>{
    const t=pruneImportant(JSON.parse(JSON.stringify(originalData)));
    safeSet(t);
  };
  document.getElementById('searchKeyword').onclick=()=>{
    const raw=document.getElementById('keywordInput').value.toLowerCase().trim();
    if(!raw)return;
    const words=raw.split(/\s+/);
    const matchAll=document.getElementById('matchAll').checked;
    const cut=document.getElementById('cutToMatch').checked;
    const impOnly=document.getElementById('importantOnly').checked;
    let src=originalData,tree=JSON.parse(JSON.stringify(originalData));
    if(impOnly){src=pruneImportant(JSON.parse(JSON.stringify(originalData)));tree=JSON.parse(JSON.stringify(src));}
    const p=pruneKeyword(tree,words,matchAll,cut,src);
    if(p)safeSet(p);
  };
  document.getElementById('resetTree').onclick=()=>safeSet(JSON.parse(JSON.stringify(originalData)));
  document.getElementById('fav-show-all').onclick=()=>{
    if(!favorites.length){showToast('暂无收藏，右键节点添加');return;}
    const kept=new Set();
    favorites.forEach(f=>keptByPath(originalData,f.path,f.type).forEach(c=>kept.add(c)));
    const t=JSON.parse(JSON.stringify(originalData));
    const p=pruneToKept(t,kept);
    if(p)safeSet(p);
  };

  /* ══ 右键菜单 ══ */
  const ctxMenu=document.getElementById('context-menu');
  let ctxContent=null;
  function showCtx(e,content){
    ctxContent=content;
    const x=Math.min(e.clientX+12,window.innerWidth-220);
    const y=Math.min(e.clientY+8,window.innerHeight-100);
    ctxMenu.style.left=x+'px';ctxMenu.style.top=y+'px';
    ctxMenu.classList.add('show');
  }
  function hideCtx(){ctxMenu.classList.remove('show');}
  document.getElementById('ctx-current').onclick=()=>{if(ctxContent)addOrUpdateFav(ctxContent,'current');hideCtx();};
  document.getElementById('ctx-all').onclick=()=>{if(ctxContent)addOrUpdateFav(ctxContent,'all');hideCtx();};

  /* ══ 弹窗 ══ */
  const modal=document.getElementById('fav-modal');
  const listEl=document.getElementById('fav-list');
  const sidebar=document.getElementById('fav-sidebar');

  let layout='one-col',sortMode='manual',gFilter='all',query='',dragIdx=null,mobileDragIdx=null,mobileDragOverIdx=null;

  /* ── 分组面板 ── */
  function gCount(gid){return gid==='all'?favorites.length:favorites.filter(f=>f.groupId==gid).length;}

  function renderGroups(){
    sidebar.querySelectorAll('.group-item').forEach(el=>el.remove());
    const addRow=document.getElementById('g-add-row');
    const allItem=makeGroupItem('all','全部收藏',gCount('all'));
    sidebar.insertBefore(allItem,addRow);
    groups.forEach(g=>{
      const item=makeGroupItem(g.id,g.name,gCount(g.id),g.id!==0);
      sidebar.insertBefore(item,addRow);
    });
  }

  function makeGroupItem(gid,name,count,canDel=false){
    const item=document.createElement('div');
    item.className='group-item'+(gFilter==gid?' active':'');
    item.style.position='relative';
    const actHtml=gid==='all'?'':`<span class="g-acts">
      <button class="g-act" title="重命名">✎</button>
      ${canDel?`<button class="g-act del" title="删除">✕</button>`:''}
    </span>`;
    item.innerHTML=`
      <span class="g-label">${name}</span>
      <span class="g-count">${count}</span>
      ${actHtml}`;

    item.addEventListener('click',e=>{
      if(e.target.closest('.g-acts'))return;
      const prev=gFilter==='all'?-1:+gFilter;
      const next=gid==='all'?-1:+gid;
      gFilter=gid;
      renderGroups();
      renderList(null,next>prev?'r':'l');
    });
    item.querySelector('.g-act:not(.del)')?.addEventListener('click',e=>{
      e.stopPropagation();startRename(gid,item);
    });
    item.querySelector('.g-act.del')?.addEventListener('click',e=>{
      e.stopPropagation();showDelOverlay(gid,item);
    });
    return item;
  }

  function startRename(gid,itemEl){
    const g=groups.find(x=>x.id===gid);if(!g)return;
    const labelEl=itemEl.querySelector('.g-label');
    const actsEl=itemEl.querySelector('.g-acts');
    const countEl=itemEl.querySelector('.g-count');
    [labelEl,actsEl,countEl].forEach(el=>el&&(el.style.display='none'));
    const inp=document.createElement('input');
    inp.className='g-inline-input';inp.value=g.name;
    itemEl.insertBefore(inp,labelEl);inp.focus();inp.select();
    function confirm(){
      const n=inp.value.trim();
      if(n&&n!==g.name){
        if(groups.some(x=>x.name===n&&x.id!==gid)){showToast('名称不能重复','danger');return;}
        g.name=n;save();showToast('已重命名','success');
      }
      renderGroups();renderList();
    }
    function cancel(){
      inp.remove();
      [labelEl,actsEl,countEl].forEach(el=>el&&(el.style.display=''));
    }
    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter')confirm();
      if(e.key==='Escape')cancel();
      e.stopPropagation();
    });
    inp.addEventListener('blur',()=>setTimeout(cancel,100));
  }

  function showDelOverlay(gid,itemEl){
    document.querySelectorAll('.del-overlay.open').forEach(el=>{el.classList.remove('open');setTimeout(()=>el.remove(),200);});
    const g=groups.find(x=>x.id===gid);if(!g)return;
    const ov=document.createElement('div');
    ov.className='del-overlay';
    ov.innerHTML=`<p>删除「${g.name}」？<br/>收藏将移至默认分组</p>
      <div class="del-overlay-btns">
        <button class="d-ok">删除</button>
        <button class="d-no">取消</button>
      </div>`;
    itemEl.appendChild(ov);
    requestAnimationFrame(()=>ov.classList.add('open'));
    ov.querySelector('.d-ok').addEventListener('click',e=>{
      e.stopPropagation();
      favorites.forEach(f=>{if(f.groupId===gid)f.groupId=0;});
      groups=groups.filter(x=>x.id!==gid);
      if(gFilter==gid)gFilter='all';
      save();renderGroups();renderList();
      showToast('分组已删除','success');
    });
    ov.querySelector('.d-no').addEventListener('click',e=>{
      e.stopPropagation();
      ov.classList.remove('open');setTimeout(()=>ov.remove(),200);
    });
  }

  /* ── 新建分组 ── */
  const addRow=document.getElementById('g-add-row');
  const addInp=document.getElementById('g-add-input');
  document.getElementById('btn-add-group').addEventListener('click',()=>{
    addRow.classList.add('open');
    document.getElementById('btn-add-group').style.display='none';
    addInp.focus();
  });
  function hideAddRow(){
    addRow.classList.remove('open');addInp.value='';
    document.getElementById('btn-add-group').style.display='';
  }
  function confirmAdd(){
    const n=addInp.value.trim();
    if(!n){showToast('名称不能为空','danger');return;}
    if(groups.some(g=>g.name===n)){showToast('名称不能重复','danger');return;}
    const id=Math.max(...groups.map(g=>g.id))+1;
    groups.push({id,name:n});save();hideAddRow();renderGroups();renderList();
    showToast('分组创建成功','success');
  }
  document.getElementById('g-add-ok').addEventListener('click',confirmAdd);
  document.getElementById('g-add-cancel').addEventListener('click',hideAddRow);
  addInp.addEventListener('keydown',e=>{
    if(e.key==='Enter')confirmAdd();
    if(e.key==='Escape')hideAddRow();
    e.stopPropagation();
  });

  /* ── 收藏列表 ── */
  function getFiltered(){
    let list=[...favorites];
    if(gFilter!=='all')list=list.filter(f=>f.groupId==gFilter);
    if(query.trim()){const q=query.toLowerCase();list=list.filter(f=>f.content.toLowerCase().includes(q));}
    if(sortMode==='name')list.sort((a,b)=>a.content.localeCompare(b.content,'zh-CN'));
    return list;
  }

  function renderList(newLayout,animDir){
    if(newLayout)layout=newLayout;
    listEl.className='fav-list '+layout;
    if(animDir){
      listEl.classList.remove('anim-r','anim-l');
      requestAnimationFrame(()=>listEl.classList.add(animDir==='r'?'anim-r':'anim-l'));
    }
    const list=getFiltered();
    listEl.innerHTML='';
    if(!list.length){
      listEl.innerHTML=`<div class="fav-empty"><span class="fav-empty-icon">☆</span>暂无收藏<br/>右键思维导图节点可添加</div>`;
      return;
    }
    list.forEach(f=>{
      const ri=favorites.findIndex(x=>x.id===f.id);
      const item=document.createElement('div');
      item.className='fav-item';item.draggable=true;item.dataset.index=ri;
      const gOpts=groups.map(g=>`<option value="${g.id}" ${f.groupId==g.id?'selected':''}>${g.name}</option>`).join('');
      item.innerHTML=`
        <span class="drag-handle">⠿</span>
        <input type="checkbox" data-index="${ri}"/>
        <div class="fav-content">${f.content}</div>
        <div class="fav-item-right">
          <select class="fav-grp-sel" data-index="${ri}">${gOpts}</select>
          <span class="type-pill">${f.type==='current'?'单独':'所有'}</span>
        </div>`;
      listEl.appendChild(item);

      item.querySelector('.fav-grp-sel').addEventListener('change',e=>{
        e.stopPropagation();
        const idx=+e.target.dataset.index;
        favorites[idx].groupId=+e.target.value;
        save();renderGroups();
        if(gFilter!=='all'&&favorites[idx].groupId!=gFilter)renderList();
        showToast('已移动分组','success');
      });

      item.addEventListener('dragstart',e=>{dragIdx=ri;item.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
      item.addEventListener('dragend',()=>{item.classList.remove('dragging');dragIdx=null;document.querySelectorAll('.fav-item').forEach(el=>el.classList.remove('drag-over'));});
      item.addEventListener('dragover',e=>{e.preventDefault();if(dragIdx!=null&&dragIdx!==ri)item.classList.add('drag-over');});
      item.addEventListener('dragleave',()=>item.classList.remove('drag-over'));
      item.addEventListener('drop',e=>{
        e.preventDefault();item.classList.remove('drag-over');
        if(dragIdx!=null&&dragIdx!==ri)reorderFavorites(dragIdx,ri);
      });

      const handle=item.querySelector('.drag-handle');
      handle.addEventListener('pointerdown',e=>{
        if(e.pointerType==='mouse') return;
        e.preventDefault();
        mobileDragIdx=ri;
        mobileDragOverIdx=ri;
        item.classList.add('dragging');
      });
      handle.addEventListener('pointermove',e=>{
        if(mobileDragIdx==null) return;
        e.preventDefault();
        const overItem=document.elementFromPoint(e.clientX,e.clientY)?.closest('.fav-item');
        document.querySelectorAll('.fav-item').forEach(el=>el.classList.remove('drag-over'));
        if(!overItem) return;
        const overIdx=+overItem.dataset.index;
        if(overIdx!==mobileDragIdx){
          mobileDragOverIdx=overIdx;
          overItem.classList.add('drag-over');
        }
      });
      handle.addEventListener('pointerup',()=>{
        finalizeMobileReorder();
      });
      handle.addEventListener('pointercancel',()=>{
        finalizeMobileReorder();
      });
    });
  }

  function reorderFavorites(fromIdx,toIdx){
    if(fromIdx==null||toIdx==null||fromIdx===toIdx) return;
    const [rm]=favorites.splice(fromIdx,1);
    favorites.splice(toIdx,0,rm);
    sortMode='manual';updateSortBtns();save();renderList();
  }
  function finalizeMobileReorder(){
    document.querySelectorAll('.fav-item').forEach(el=>el.classList.remove('dragging','drag-over'));
    if(mobileDragIdx!=null&&mobileDragOverIdx!=null&&mobileDragIdx!==mobileDragOverIdx){
      reorderFavorites(mobileDragIdx,mobileDragOverIdx);
    }
    mobileDragIdx=null;
    mobileDragOverIdx=null;
  }
  document.addEventListener('pointerup',finalizeMobileReorder);

  /* ── 弹窗开关 ── */
  function openModal(){
    cleanFavs();renderGroups();
    modal.style.display='flex';
    requestAnimationFrame(()=>{
      modal.classList.add('show');
      setTimeout(()=>renderList(layout),30);

  function closeModal(){
    modal.classList.remove('show');
    modal.addEventListener('transitionend',()=>{modal.style.display='none';},{once:true});
  }
  document.getElementById('manage-favorites').onclick=openModal;
  document.getElementById('fav-close').onclick=closeModal;
  modal.addEventListener('mousedown',e=>{if(e.target===modal)closeModal();});

  /* ── 布局 ── */

  /* ── 搜索 ── */

  /* ── 排序 ── */
  function updateSortBtns(){

  updateSortBtns();

  /* ── 删除选中 ── */
  document.getElementById('fav-delete-selected').onclick=()=>{
    const cb=[...listEl.querySelectorAll('input:checked')];
    if(!cb.length){showToast('请先勾选要删除的项','danger');return;}
    const idx=cb.map(c=>+c.dataset.index).sort((a,b)=>b-a);
    idx.forEach(i=>favorites.splice(i,1));
    save();renderGroups();renderList();
    showToast(`已删除 ${idx.length} 项收藏`,'success');
  };

  /* ── 显示选中 ── */
  document.getElementById('fav-show-selected').onclick=()=>{
    const cb=[...listEl.querySelectorAll('input:checked')];
    if(!cb.length){showToast('请先勾选要显示的项','danger');return;}
    const idxs=cb.map(c=>+c.dataset.index);
    const kept=new Set();
    favorites.filter((_,i)=>idxs.includes(i)).forEach(f=>keptByPath(originalData,f.path,f.type).forEach(c=>kept.add(c)));
    if(!kept.size)return;
    const t=JSON.parse(JSON.stringify(originalData));
    const p=pruneToKept(t,kept);
    if(p){safeSet(p);closeModal();}
  };


  /* ── 导出收藏 ── */
  document.getElementById('fav-export').addEventListener('click', (e)=>{
    e.stopPropagation(); /* 防止冒泡到其他监听器 */
    try{
      const payload = JSON.stringify({ favorites, groups }, null, 2);
      const blob    = new Blob([payload], { type:'application/json' });
      const url     = URL.createObjectURL(blob);
      const a       = document.createElement('a');
      a.href        = url;
      a.download    = 'favorites_' + new Date().toISOString().slice(0,10) + '.json';
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
      showToast('收藏已导出', 'success');
    }catch(err){
      showToast('导出失败：' + err.message, 'danger');
    }
  });

  /* ── 导入收藏 ── */
  document.getElementById('fav-import-input').addEventListener('change', e=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = evt=>{
      try{
        const parsed         = JSON.parse(evt.target.result);
        const importedFavs   = parsed.favorites || [];
        const importedGroups = parsed.groups    || [];

        /* 合并分组（按名称去重，id 重新分配） */
        importedGroups.forEach(ig=>{
          if(!groups.some(g=>g.name===ig.name)){
            const newId = Math.max(...groups.map(g=>g.id), 0) + 1;
            groups.push({ id:newId, name:ig.name });
          }
        });

        /* 建立旧 id → 新 id 映射 */
        const idMap = {};
        importedGroups.forEach(ig=>{
          const match = groups.find(g=>g.name===ig.name);
          if(match) idMap[ig.id] = match.id;
        });

        /* 合并收藏：校验节点存在 + 去重 */
        let added=0, skipped=0, invalid=0;
        importedFavs.forEach(f=>{
          if(!f.path || !nodeExistsInOrig(f.path)){ invalid++; return; }
          if(favorites.some(x=>JSON.stringify(x.path)===JSON.stringify(f.path))){ skipped++; return; }
          favorites.push({ ...f, id:crypto.randomUUID(), groupId: idMap[f.groupId] ?? 0 });
          added++;
        });

        save(); renderGroups(); renderList();
        const msg = '导入完成：新增 '+added+' 条'
          + (skipped ? '，跳过重复 '+skipped+' 条' : '')
          + (invalid ? '，无效/失效 '+invalid+' 条' : '');
        showToast(msg, added>0?'success':'default', 4000);
      }catch(err){
        showToast('导入失败：文件格式不正确', 'danger');
      }
      e.target.value = '';
    };
    reader.readAsText(file);
  });

  /* ══ 初始化 ══ */
  load();attachEvents();cleanFavs();
})();
</script>
