<div id="toast-container" class="toast-container"></div>
<!-- 音乐播放器 -->
<div id="music-player">
  <div class="mp-drag" id="mp-drag">
    <div class="mp-title-row">
      <div class="mp-icon">♪</div>
      <span class="mp-label">Now Playing</span>
    </div>
    <div style="display:flex;align-items:center;gap:4px;">
      <button class="mp-upload-btn" id="mp-upload" title="上传音频">＋</button>
      <input type="file" id="mp-upload-input" accept="audio/*" multiple style="display:none"/>
      <button class="mp-collapse" id="mp-collapse" title="折叠">▲</button>
    </div>
  </div>
  <div class="mp-body">
    <div><!-- grid-row 动画内容包裹层 -->
    <div class="mp-track">
      <div class="mp-cover">
        <img id="mp-cover-img" style="display:none;width:100%;height:100%;object-fit:cover;border-radius:10px;"/>
        <span id="mp-cover-emoji">🎵</span>
        <div class="mp-cover-spin"></div>
      </div>
      <div class="mp-info">
        <div class="mp-song" id="mp-song">上传或选择曲目</div>
        <div class="mp-artist" id="mp-artist">— —</div>
      </div>
    </div>
    <div class="mp-progress-wrap">
      <span class="mp-time" id="mp-cur">0:00</span>
      <div class="mp-bar" id="mp-bar"><div class="mp-bar-fill" id="mp-fill"></div></div>
      <span class="mp-time right" id="mp-dur">0:00</span>
    </div>
    <div class="mp-controls">
      <button class="mp-btn" id="mp-shuffle" title="随机">⇄</button>
      <button class="mp-btn" id="mp-prev" title="上一首">⏮</button>
      <button class="mp-btn mp-play" id="mp-play">▶</button>
      <button class="mp-btn" id="mp-next" title="下一首">⏭</button>
      <button class="mp-btn" id="mp-repeat" title="循环">↻</button>
      <button class="mp-list-btn" id="mp-list-btn" title="播放列表">☰</button>
    </div>
    <div class="mp-volume">
      <span class="mp-vol-icon" id="mp-vol-icon">🔉</span>
      <div class="mp-vol-bar" id="mp-vol-bar"><div class="mp-vol-fill" id="mp-vol-fill"></div></div>
    </div>
    <div class="mp-playlist" id="mp-playlist"></div>
    </div><!-- /grid-row 包裹层 -->
  </div>
</div>
