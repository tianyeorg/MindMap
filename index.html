<!doctype html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Revival Society政治复习思维导图</title>

<style>

:root{
	--bg:#0e1014;
	--panel:#171c26;
	--panel-soft:#141922;
	--text:#e8ecf4;
	--accent:#7da2ff;
	--accent-soft:rgba(125,162,255,.15);
	--line:hsla(0,0%,100%,.6);
}

*{
	margin:0;
	padding:0;
	box-sizing:border-box;
}

html,body{
	height:100%;
	background:var(--bg);

	font-family:
	"Georgia",
	"Noto Serif SC",
	"Source Han Serif SC",
	serif;

	color:var(--text);
	overflow-x: hidden;
}

/* --- 开场动画核心样式 --- */
#intro-overlay {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    transition: opacity 1.2s cubic-bezier(0.65, 0, 0.35, 1);
}

.intro-text-wrapper {
    text-align: center;
}

.intro-char {
    display: inline-block;
    font-size: 42px;
    font-weight: 500;
    letter-spacing: 4px;
    color: var(--text);
    opacity: 0;
    filter: blur(12px);
    transform: scale(1.5);
    animation: charReveal 0.8s cubic-bezier(0.2, 0, 0.2, 1) forwards;
}

@keyframes charReveal {
    0% { opacity: 0; filter: blur(12px); transform: scale(1.5); }
    100% { opacity: 1; filter: blur(0); transform: scale(1); }
}

.intro-glow {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(125,162,255,0.15) 0%, transparent 70%);
    opacity: 0;
    animation: glowPulse 2s ease-in-out forwards;
}

@keyframes glowPulse {
    0% { opacity: 0; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.1); }
    100% { opacity: 0; transform: scale(1.2); }
}

/* 隐藏主内容，待动画结束后显示 */
.wrapper, .footer {
    opacity: 0;
    transform: translateY(20px);
    transition: all 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
}

body.loaded .wrapper, body.loaded .footer {
    opacity: 1;
    transform: translateY(0);
}

body.loaded #intro-overlay {
    opacity: 0;
}

/* 背景渐变 */
body::before{
	content:"";
	position:fixed;
	inset:0;
	background:
	radial-gradient(
		circle at 20% 20%,
		rgba(125,162,255,.08),
		transparent 40%
	),
	radial-gradient(
		circle at 80% 60%,
		rgba(125,162,255,.06),
		transparent 45%
	);
	pointer-events:none;
}

/* 页面布局 */
.wrapper{
	min-height:100%;
	display:flex;
	flex-direction:column;
	align-items:center;
	justify-content:center;
	padding:60px 20px;
	gap:48px;
}

/* 标题 */
.title{
	font-size:38px;
	letter-spacing:.5px;
	text-align:center;
	font-weight:500;
}

/* 副标题 */
.subtitle{
	font-size:14px;
	color:rgba(230,235,255,.55);
	margin-top:6px;
	letter-spacing:.8px;
	text-align:center;
}

/* 书籍网格 */
.grid{
	width:100%;
	max-width:900px;
	display:grid;
	grid-template-columns: repeat(auto-fit,minmax(180px,1fr));
	gap:18px;
}

/* 卡片按钮 */
.card{
	position:relative;
	padding:22px 18px;
	border-radius:16px;
	background:var(--panel-soft);
	border:1px solid rgba(255,255,255,.06);
	cursor:pointer;
	text-decoration:none;
	color:var(--text);
	backdrop-filter:blur(10px);
	transition:
	transform .25s cubic-bezier(.2,.8,.2,1),
	border-color .2s,
	box-shadow .25s;
}

.card::before{
	content:"";
	position:absolute;
	inset:0;
	border-radius:16px;
	background:
	linear-gradient(
		120deg,
		transparent,
		rgba(125,162,255,.35),
		transparent
	);
	opacity:0;
	transition:.35s;
}

.card:hover{
	transform:translateY(-4px);
	border-color:rgba(125,162,255,.35);
	box-shadow:
	0 12px 35px rgba(0,0,0,.45),
	0 0 12px rgba(125,162,255,.25);
}

.card:hover::before{
	opacity:.4;
}

.book-title{
	font-size:16px;
	line-height:1.4;
}

.level{
	font-size:12px;
	margin-top:6px;
	color:rgba(230,235,255,.5);
}

/* 页脚 */
.footer{
	position:fixed;
	bottom:18px;
	font-size:12px;
	color:rgba(230,235,255,.4);
	letter-spacing:.5px;
}

</style>

</head>

<body>

<!-- 开场动画遮罩 -->
<div id="intro-overlay">
    <div class="intro-glow"></div>
    <div class="intro-text-wrapper" id="intro-text">
		Revival-Society
        <!-- 这里的文字将由JS动态生成 -->
    </div>
</div>

<div class="wrapper">
	<div>
		<div class="title">
			Revival Society
			<br>
			政治复习思维导图
		</div>
		<div class="subtitle">
			Made In Heaven Studio.
		</div>
	</div>

	<div class="grid">
		<a class="card" href="bx1.html">
			<div class="book-title">政治必修一</div>
			<div class="level">中国特色社会主义</div>
		</a>
		<a class="card" href="bx4.html">
			<div class="book-title">政治必修四</div>
			<div class="level">哲学与文化</div>
		</a>
	</div>
</div>

<div class="footer">
	Revival Society KING'S ORG.
</div>

<!-- 音乐播放器部分保持不变 -->
<div id="toast-container" class="toast-container"></div>
<div id="music-player" class="mp-pending-init">
  <div class="mp-drag" id="mp-drag">
    <div class="mp-title-row">
      <div class="mp-icon">♪</div>
      <span class="mp-label">Now Playing</span>
    </div>
    <div style="display:flex;align-items:center;gap:4px;">
      <button class="mp-upload-btn" id="mp-upload" title="上传音频">＋</button>
      <input type="file" id="mp-upload-input" accept="audio/*" multiple style="display:none"/>
      <button class="mp-collapse" id="mp-collapse" title="折叠">▲</button>
    </div>
  </div>
  <div class="mp-body">
    <div>
    <div class="mp-track">
      <div class="mp-cover">
        <img id="mp-cover-img" style="display:none;width:100%;height:100%;object-fit:cover;border-radius:10px;"/>
        <span id="mp-cover-emoji">🎵</span>
        <div class="mp-cover-spin"></div>

      <div class="mp-info">
        <div class="mp-song" id="mp-song">上传或选择曲目</div>

      <button class="mp-list-btn" id="mp-list-btn" title="播放列表">☰</button>
    </div>
    <div class="mp-volume">
      <span class="mp-vol-icon" id="mp-vol-icon">🔉</span>
      <div class="mp-vol-bar" id="mp-vol-bar"><div class="mp-vol-fill" id="mp-vol-fill"></div></div>
    </div>
    <div class="mp-playlist" id="mp-playlist"></div>
    </div>
  </div>
</div>

<link rel="stylesheet" href="player/player.css">
<script src="js/jsmediatags@3.9.7-dist-jsmediatags.min.js"></script>
<script src="js/d3@7.9.0-dist-d3.min.js"></script>
<script src="js/markmap-view@0.18.12-dist-browser-index.js"></script>
<script src="js/markmap-toolbar@0.18.12-dist-index.js"></script>
<script src="player/player.js"></script>

<script>
// 开场动画脚本
document.addEventListener('DOMContentLoaded', () => {
    const container = document.getElementById('intro-text');
    
    // 1. 获取你在 HTML 标签里手动输入的文字
    // 如果标签里没写字，就默认显示 "REVIVAL SOCIETY"
    const originalText = container.innerText.trim() || "REVIVAL SOCIETY";
    
    // 2. 清空容器，防止重复叠加
    container.innerHTML = '';
    
    // 3. 将文字拆解并生成动画节点
    originalText.split('').forEach((char, i) => {
        const span = document.createElement('span');
        // 处理空格
        span.innerText = char === ' ' ? '\u00A0' : char;
        span.className = 'intro-char';
        // 动态计算延迟，营造 Netflix 那种一个接一个跳出的节奏感
        span.style.animationDelay = `${i * 0.07}s`; 
        container.appendChild(span);
    });

    // 4. 控制整个开场遮罩的消失时间
    setTimeout(() => {
        document.body.classList.add('loaded');
        setTimeout(() => {
            const overlay = document.getElementById('intro-overlay');
            if(overlay) overlay.remove();
        }, 1200);
    }, (originalText.length * 70) + 1500); 
});
</script>

</body>
</html>
