<!doctype html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Revival Society政治复习思维导图</title>

<style>

:root{
	--bg:#0e1014;
	--panel:#171c26;
	--panel-soft:#141922;
	--text:#e8ecf4;
	--accent:#7da2ff;
	--accent-soft:rgba(125,162,255,.15);
	--line:hsla(0,0%,100%,.6);
}

*{
	margin:0;
	padding:0;
	box-sizing:border-box;
}

html,body{
	height:100%;
	background:var(--bg);

	font-family:
	"Georgia",
	"Noto Serif SC",
	"Source Han Serif SC",
	serif;

	color:var(--text);
}

/* 背景渐变 */

body::before{

	content:"";

	position:fixed;
	inset:0;

	background:
	radial-gradient(
		circle at 20% 20%,
		rgba(125,162,255,.08),
		transparent 40%
	),

	radial-gradient(
		circle at 80% 60%,
		rgba(125,162,255,.06),
		transparent 45%
	);

	pointer-events:none;

}

/* 页面布局 */

.wrapper{

	min-height:100%;

	display:flex;
	flex-direction:column;

	align-items:center;
	justify-content:center;

	padding:60px 20px;

	gap:48px;

}

/* 标题 */

.title{

	font-size:38px;

	letter-spacing:.5px;

	text-align:center;

	font-weight:500;

	opacity:0;

	animation:fadeUp .8s ease forwards;

}

/* 副标题 */

.subtitle{

	font-size:14px;

	color:rgba(230,235,255,.55);

	margin-top:6px;

	letter-spacing:.8px;

}

/* 书籍网格 */

.grid{

	width:100%;
	max-width:900px;

	display:grid;

	grid-template-columns:

	repeat(auto-fit,minmax(180px,1fr));

	gap:18px;

}

/* 卡片按钮 */

.card{

	position:relative;

	padding:22px 18px;

	border-radius:16px;

	background:var(--panel-soft);

	border:1px solid rgba(255,255,255,.06);

	cursor:pointer;

	text-decoration:none;

	color:var(--text);

	backdrop-filter:blur(10px);

	transition:

	transform .25s cubic-bezier(.2,.8,.2,1),

	border-color .2s,

	box-shadow .25s;

	opacity:0;

	animation:fadeUp .6s ease forwards;

}

/* 发光边 */

.card::before{

	content:"";

	position:absolute;

	inset:0;

	border-radius:16px;

	background:

	linear-gradient(
		120deg,
		transparent,
		rgba(125,162,255,.35),
		transparent
	);

	opacity:0;

	transition:.35s;

}

.card:hover{

	transform:translateY(-4px);

	border-color:rgba(125,162,255,.35);

	box-shadow:

	0 12px 35px rgba(0,0,0,.45),

	0 0 12px rgba(125,162,255,.25);

}

.card:hover::before{

	opacity:.4;

}

/* 书名 */

.book-title{

	font-size:16px;

	line-height:1.4;

}

/* 层级说明 */

.level{

	font-size:12px;

	margin-top:6px;

	color:rgba(230,235,255,.5);

}

/* 动画 */

@keyframes fadeUp{

	from{

		opacity:0;
		transform:translateY(18px);

	}

	to{

		opacity:1;
		transform:none;

	}

}

/* 延迟 */

.card:nth-child(1){animation-delay:.1s}
.card:nth-child(2){animation-delay:.15s}
.card:nth-child(3){animation-delay:.2s}
.card:nth-child(4){animation-delay:.25s}
.card:nth-child(5){animation-delay:.3s}
.card:nth-child(6){animation-delay:.35s}
.card:nth-child(7){animation-delay:.4s}
.card:nth-child(8){animation-delay:.45s}

/* 页脚 */

.footer{

	position:fixed;

	bottom:18px;

	font-size:12px;

	color:rgba(230,235,255,.4);

	letter-spacing:.5px;

}

</style>

</head>

<body>

<div class="wrapper">

	<div>

		<div class="title">
			Revival Society
			<br>
			政治复习思维导图
		</div>

		<div class="subtitle">
			Made In Heaven Studio.
		</div>

	</div>


	<div class="grid">

		<a class="card" href="bx1.html">

			<div class="book-title">
				政治必修一
			</div>

			<div class="level">
				中国特色社会主义
			</div>

		</a>



		<a class="card" href="bx4.html">

			<div class="book-title">
				政治必修四
			</div>

			<div class="level">
				哲学与文化
			</div>

		</a>

	</div>


</div>

<div class="footer">
	Revival Society KING'S ORG.
</div>
